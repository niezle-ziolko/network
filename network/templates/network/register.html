{% extends "network/layout.html" %}
{% load static %}

{% block body %}
<div class="register">
<div class="box-image">
<img src="{% static '/network/logo.svg' %}" height="400" alt="logo"/>
</div>

<div class="box-login">
<div>
   {% if message %}
<div>{{ message }}</div>
{% endif %}

<h2 class="title">Happening now</h2>

<h3 class="subtitle">Join today.</h3>

<div class="form-login">
<form action="{% url 'register' %}" method="post">
  {% csrf_token %}
  <div class="form-group">
   <input class="form-control" autofocus type="text" name="username" placeholder="Username">
</div>

<div class="form-group">
   <input class="form-control" type="email" name="email" placeholder="Email Address">
</div>

<div class="form-group">
   <input class="form-control" type="password" name="password" placeholder="Password">
</div>

<div class="form-group">
   <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
</div>

<input class="btn btn-primary" type="submit" value="Register">
</form>

<br>Already have an account? <a href="{% url 'login' %}">Log In here.</a>
</div>
</div>
</div>
</div>
{% endblock %}

{% block script %}
   <link rel="preload" href="{% static '/network/Chirp-Extended-Heavy.woff2' %}" as="font" crossorigin="" type="font/woff">
{% endblock %}
